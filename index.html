<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUPSS Course Completion Lookup | Profit Soup</title>
    <link rel="icon" href="https://d36ai2hkxl16us.cloudfront.net/thoughtindustries/image/upload/a_exif,c_fit,t_ti_favicon_v4/v1467924760/rwusklhdmeehyv12sfgl.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f0eb;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ---- Top bar with UPS brown ---- */
        .top-bar {
            background: #351C15;
            height: 6px;
        }

        /* ---- Header with logo ---- */
        .site-header {
            background: #fff;
            border-bottom: 1px solid #e0d6cc;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            height: 50px;
            object-fit: contain;
        }

        /* ---- Main content ---- */
        .main {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 48px 20px 40px;
        }

        .container {
            width: 100%;
            max-width: 560px;
        }

        .page-title {
            text-align: center;
            margin-bottom: 32px;
        }

        .page-title h1 {
            font-size: 22px;
            font-weight: 700;
            color: #351C15;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
        }

        .page-title p {
            font-size: 14px;
            color: #7a6a5c;
            font-weight: 400;
        }

        /* ---- Card ---- */
        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(53, 28, 21, 0.08), 0 8px 24px rgba(53, 28, 21, 0.06);
            padding: 36px 32px;
            border: 1px solid #e8dfd6;
        }

        /* ---- Form ---- */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #5a4a3c;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            border: 2px solid #d9cfc4;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fdfbf9;
        }

        .form-group input:focus {
            border-color: #FFB500;
            box-shadow: 0 0 0 3px rgba(255, 181, 0, 0.15);
            background: #fff;
        }

        .form-group input::placeholder {
            color: #b8a99a;
        }

        /* ---- Buttons ---- */
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: #644117;
            color: #fff;
        }

        .btn-primary:hover {
            background: #351C15;
        }

        .btn-reset {
            background: transparent;
            color: #644117;
            border: 2px solid #d9cfc4;
            margin-top: 16px;
            text-transform: none;
            font-weight: 600;
            letter-spacing: 0;
        }

        .btn-reset:hover {
            background: #f5f0eb;
            border-color: #644117;
        }

        /* ---- Results ---- */
        .result {
            display: none;
        }

        .result.visible {
            display: block;
        }

        .result-box {
            padding: 28px 24px;
            border-radius: 10px;
            text-align: center;
        }

        .result-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        .result-box.success {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border: 2px solid #66bb6a;
        }

        .result-box.partial {
            background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
            border: 2px solid #FFB500;
        }

        .result-box.none {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            border: 2px solid #ef6c00;
        }

        .result-box.not-found {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            border: 2px solid #c62828;
        }

        .result-status {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #351C15;
            line-height: 1.3;
        }

        .result-name {
            font-size: 15px;
            font-weight: 500;
            color: #5a4a3c;
            margin-bottom: 2px;
        }

        .result-email {
            font-size: 13px;
            font-weight: 400;
            color: #7a6a5c;
            margin-bottom: 12px;
        }

        .result-count {
            display: inline-block;
            font-size: 36px;
            font-weight: 700;
            color: #351C15;
            line-height: 1;
            margin: 8px 0;
        }

        .result-count span {
            font-size: 16px;
            font-weight: 500;
            color: #7a6a5c;
        }

        .result-detail {
            font-size: 14px;
            color: #5a4a3c;
            line-height: 1.6;
            margin-top: 12px;
        }

        /* ---- Progress bar ---- */
        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.6);
            border-radius: 6px;
            margin: 16px 0 8px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            border-radius: 6px;
            transition: width 0.6s ease;
        }

        .progress-bar.full { background: linear-gradient(90deg, #43a047, #66bb6a); }
        .progress-bar.partial { background: linear-gradient(90deg, #f9a825, #FFB500); }
        .progress-bar.zero { background: #ccc; width: 0%; }

        /* ---- Note box ---- */
        .result-note {
            margin-top: 20px;
            padding: 14px 18px;
            background: #fdfbf9;
            border: 1px solid #e8dfd6;
            border-radius: 8px;
            font-size: 12px;
            color: #7a6a5c;
            line-height: 1.6;
        }

        .result-note strong {
            color: #5a4a3c;
        }

        .result-note a {
            color: #0e665c;
            text-decoration: none;
            font-weight: 600;
        }

        .result-note a:hover {
            text-decoration: underline;
        }

        /* ---- Error ---- */
        .error-msg {
            color: #c62828;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }

        /* ---- Footer ---- */
        .site-footer {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            color: #a99585;
        }

        .site-footer .report-date {
            font-weight: 600;
            color: #7a6a5c;
        }

        /* ---- Responsive ---- */
        @media (max-width: 480px) {
            .card {
                padding: 28px 20px;
            }

            .result-status {
                font-size: 18px;
            }

            .result-count {
                font-size: 30px;
            }

            .page-title h1 {
                font-size: 19px;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar"></div>

    <header class="site-header">
        <img
            src="https://d36ai2hkxl16us.cloudfront.net/thoughtindustries/image/upload/a_exif,c_fit,t_ti_company_logo_hires_v3/v1475280798/bmesy4yvwgdttlu4mhgo.jpg"
            alt="Profit Soup"
            class="logo"
        >
    </header>

    <main class="main">
        <div class="container">
            <div class="page-title">
                <h1>TUPSS Course Completion Lookup</h1>
                <p>Check a learner's course completion status</p>
            </div>

            <div class="card">
                <form id="lookupForm" onsubmit="handleLookup(event)">
                    <div class="form-group">
                        <label for="emailInput">Learner Email Address</label>
                        <input
                            type="email"
                            id="emailInput"
                            placeholder="Enter email address"
                            required
                            autocomplete="off"
                            spellcheck="false"
                        >
                        <div id="errorMsg" class="error-msg"></div>
                    </div>
                    <button type="submit" class="btn btn-primary" id="lookupBtn">Look Up</button>
                </form>

                <div id="result" class="result">
                    <div id="resultBox" class="result-box">
                        <span id="resultIcon" class="result-icon"></span>
                        <div id="resultName" class="result-name"></div>
                        <div id="resultEmail" class="result-email"></div>
                        <div id="resultStatus" class="result-status"></div>
                        <div id="resultCount" class="result-count"></div>
                        <div id="progressContainer" class="progress-bar-container">
                            <div id="progressBar" class="progress-bar"></div>
                        </div>
                        <div id="resultDetail" class="result-detail"></div>
                    </div>
                    <div class="result-note">
                        <strong>Note:</strong> Course completions are updated weekly. Recent course completions
                        may not be included. Learners can check their current status from their learner dashboard
                        by signing in at <a href="https://www.profitsouponline.com" target="_blank" rel="noopener">www.profitsouponline.com</a>.
                    </div>
                    <button type="button" class="btn btn-reset" onclick="resetForm()">&#8592; Look Up Another Email</button>
                </div>
            </div>

            <div class="site-footer">
                <span id="reportInfo"></span>
            </div>
        </div>
    </main>

    <script>
        let learnerData = null;
        let reportDate = '';

        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Failed to load data');
                const data = await response.json();
                learnerData = data.learners;
                reportDate = data.report_date || '';

                if (reportDate) {
                    document.getElementById('reportInfo').innerHTML =
                        'Data from report dated <span class="report-date">' + reportDate + '</span>';
                }
            } catch (err) {
                console.error('Error loading data:', err);
                document.getElementById('errorMsg').textContent =
                    'Unable to load learner data. Please try refreshing the page.';
                document.getElementById('errorMsg').classList.add('visible');
                document.getElementById('lookupBtn').disabled = true;
            }
        }

        function handleLookup(event) {
            event.preventDefault();

            const emailInput = document.getElementById('emailInput');
            const email = emailInput.value.trim().toLowerCase();

            document.getElementById('errorMsg').classList.remove('visible');

            if (!email) {
                showError('Please enter an email address.');
                return;
            }

            if (!learnerData) {
                showError('Data is still loading. Please wait a moment and try again.');
                return;
            }

            const resultDiv = document.getElementById('result');
            const resultBox = document.getElementById('resultBox');
            const resultIcon = document.getElementById('resultIcon');
            const resultName = document.getElementById('resultName');
            const resultStatus = document.getElementById('resultStatus');
            const resultCount = document.getElementById('resultCount');
            const resultDetail = document.getElementById('resultDetail');
            const progressBar = document.getElementById('progressBar');
            const progressContainer = document.getElementById('progressContainer');

            resultBox.className = 'result-box';
            progressBar.className = 'progress-bar';
            resultName.textContent = '';
            document.getElementById('resultEmail').textContent = '';
            resultCount.innerHTML = '';
            resultDetail.textContent = '';
            resultStatus.textContent = '';
            progressContainer.style.display = 'none';

            const learner = learnerData[email];

            const resultEmail = document.getElementById('resultEmail');

            if (!learner) {
                resultBox.classList.add('not-found');
                resultIcon.textContent = '\u2716';
                resultStatus.textContent = 'Learner not found.';
                resultDetail.textContent =
                    'There is no record for this email address in Profit Soup Online.';
            } else if (learner.completed >= 14) {
                resultBox.classList.add('success');
                resultIcon.textContent = '\u2714';
                resultName.textContent = learner.name;
                resultEmail.textContent = email;
                resultStatus.textContent = 'All courses completed!';
                resultCount.innerHTML = '14 <span>of 14</span>';
                progressContainer.style.display = 'block';
                progressBar.classList.add('full');
                progressBar.style.width = '100%';
                if (learner.completion_date) {
                    resultDetail.textContent = 'Completion date: ' + learner.completion_date;
                }
            } else if (learner.completed > 0) {
                resultBox.classList.add('partial');
                resultIcon.textContent = '\u25D4';
                resultName.textContent = learner.name;
                resultEmail.textContent = email;
                resultStatus.textContent = learner.completed + ' of 14 courses completed';
                resultCount.innerHTML = learner.completed + ' <span>of 14</span>';
                progressContainer.style.display = 'block';
                progressBar.classList.add('partial');
                progressBar.style.width = ((learner.completed / 14) * 100) + '%';
            } else {
                resultBox.classList.add('none');
                resultIcon.textContent = '\u25CB';
                resultName.textContent = learner.name;
                resultEmail.textContent = email;
                resultStatus.textContent = 'No courses completed';
                resultCount.innerHTML = '0 <span>of 14</span>';
                progressContainer.style.display = 'block';
                progressBar.classList.add('zero');
                progressBar.style.width = '0%';
                resultDetail.textContent = '';
            }

            resultDiv.classList.add('visible');
            document.getElementById('lookupForm').style.display = 'none';
        }

        function resetForm() {
            document.getElementById('lookupForm').style.display = 'block';
            document.getElementById('result').classList.remove('visible');
            document.getElementById('emailInput').value = '';
            document.getElementById('emailInput').focus();
        }

        function showError(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = msg;
            errorEl.classList.add('visible');
        }

        loadData();
    </script>
</body>
</html>
