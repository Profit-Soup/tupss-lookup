<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUPSS Course Completion Lookup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #666;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            padding: 32px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #4a6cf7;
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: #4a6cf7;
            color: #fff;
        }

        .btn-primary:hover {
            background-color: #3b5de7;
        }

        .btn-secondary {
            background-color: #e8ecf1;
            color: #555;
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background-color: #dce1e8;
        }

        /* Result styles */
        .result {
            display: none;
            margin-top: 24px;
        }

        .result.visible {
            display: block;
        }

        .result-box {
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid;
        }

        .result-box.success {
            background-color: #e8f5e9;
            border-left-color: #43a047;
        }

        .result-box.partial {
            background-color: #fff8e1;
            border-left-color: #f9a825;
        }

        .result-box.none {
            background-color: #fff3e0;
            border-left-color: #ef6c00;
        }

        .result-box.not-found {
            background-color: #fce4ec;
            border-left-color: #c62828;
        }

        .result-status {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .result-detail {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
        }

        .result-note {
            margin-top: 16px;
            padding: 12px 16px;
            background-color: #f0f4f8;
            border-radius: 6px;
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }

        .result-note a {
            color: #4a6cf7;
            text-decoration: none;
        }

        .result-note a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #999;
            padding: 20px;
        }

        .footer .report-date {
            font-weight: 500;
            color: #777;
        }

        /* Loading spinner */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #888;
        }

        .loading.visible {
            display: block;
        }

        .error-msg {
            color: #c62828;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>TUPSS Course Completion Lookup</h1>
            <p>Check a learner's course completion status</p>
        </div>

        <div class="card">
            <form id="lookupForm" onsubmit="handleLookup(event)">
                <div class="form-group">
                    <label for="emailInput">Learner Email Address</label>
                    <input
                        type="email"
                        id="emailInput"
                        placeholder="Enter email address"
                        required
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <div id="errorMsg" class="error-msg"></div>
                </div>
                <button type="submit" class="btn btn-primary" id="lookupBtn">Look Up</button>
            </form>

            <div id="loading" class="loading">
                Loading data...
            </div>

            <div id="result" class="result">
                <div id="resultBox" class="result-box">
                    <div id="resultStatus" class="result-status"></div>
                    <div id="resultDetail" class="result-detail"></div>
                </div>
                <div class="result-note">
                    <strong>Note:</strong> Course completions are updated weekly. Recent course completions
                    may not be included. Learners can check their current status from their learner dashboard
                    by signing in at <a href="https://www.profitsouponline.com" target="_blank" rel="noopener">www.profitsouponline.com</a>.
                </div>
                <button type="button" class="btn btn-secondary" onclick="resetForm()">Look Up Another Email</button>
            </div>
        </div>

        <div class="footer">
            <span id="reportInfo"></span>
        </div>
    </div>

    <script>
        let learnerData = null;
        let reportDate = '';

        // Load the data file on page load
        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Failed to load data');
                const data = await response.json();
                learnerData = data.learners;
                reportDate = data.report_date || '';
                const totalLearners = data.total_learners || Object.keys(learnerData).length;

                if (reportDate) {
                    document.getElementById('reportInfo').innerHTML =
                        'Data from report dated <span class="report-date">' + reportDate + '</span>';
                }
            } catch (err) {
                console.error('Error loading data:', err);
                document.getElementById('errorMsg').textContent =
                    'Unable to load learner data. Please try refreshing the page.';
                document.getElementById('errorMsg').classList.add('visible');
                document.getElementById('lookupBtn').disabled = true;
            }
        }

        function handleLookup(event) {
            event.preventDefault();

            const emailInput = document.getElementById('emailInput');
            const email = emailInput.value.trim().toLowerCase();

            // Clear previous state
            document.getElementById('errorMsg').classList.remove('visible');

            if (!email) {
                showError('Please enter an email address.');
                return;
            }

            if (!learnerData) {
                showError('Data is still loading. Please wait a moment and try again.');
                return;
            }

            // Look up the email
            const resultDiv = document.getElementById('result');
            const resultBox = document.getElementById('resultBox');
            const resultStatus = document.getElementById('resultStatus');
            const resultDetail = document.getElementById('resultDetail');

            // Remove all style classes
            resultBox.className = 'result-box';

            const learner = learnerData[email];

            if (!learner) {
                // Not found
                resultBox.classList.add('not-found');
                resultStatus.textContent = 'Learner not found.';
                resultDetail.textContent =
                    'There is no record for this email address in Profit Soup Online.';
            } else if (learner.completed >= 14) {
                // All courses completed
                resultBox.classList.add('success');
                resultStatus.textContent = 'Learner found \u2013 all courses completed (14 of 14).';
                resultDetail.textContent =
                    'This information has been provided to The UPS Stores but the records may lag by one to two weeks.';
            } else if (learner.completed > 0) {
                // Some courses completed
                resultBox.classList.add('partial');
                resultStatus.textContent =
                    'Learner found \u2013 some courses completed (' + learner.completed + ' of 14).';
                resultDetail.textContent = '';
            } else {
                // Zero courses completed
                resultBox.classList.add('none');
                resultStatus.textContent = 'Learner found \u2013 no courses completed (0 of 14).';
                resultDetail.textContent = '';
            }

            resultDiv.classList.add('visible');

            // Hide the form
            document.getElementById('lookupForm').style.display = 'none';
        }

        function resetForm() {
            // Show the form, hide results
            document.getElementById('lookupForm').style.display = 'block';
            document.getElementById('result').classList.remove('visible');
            document.getElementById('emailInput').value = '';
            document.getElementById('emailInput').focus();
        }

        function showError(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = msg;
            errorEl.classList.add('visible');
        }

        // Load data on page load
        loadData();
    </script>
</body>
</html>
